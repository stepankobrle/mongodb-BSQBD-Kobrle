version: '3.8'

services:
  # Config servery
  configsvr1:
    image: mongo:8.0
    container_name: configsvr1
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --configsvr --replSet configReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - configsvr1_data:/data/db
      - ./init-scripts:/init-scripts
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  configsvr2:
    image: mongo:8.0
    container_name: configsvr2
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --configsvr --replSet configReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - configsvr2_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  configsvr3:
    image: mongo:8.0
    container_name: configsvr3
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --configsvr --replSet configReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - configsvr3_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  # Shard 1
  shard1svr1:
    image: mongo:8.0
    container_name: shard1svr1
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard1ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard1svr1_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  shard1svr2:
    image: mongo:8.0
    container_name: shard1svr2
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard1ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard1svr2_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  shard1svr3:
    image: mongo:8.0
    container_name: shard1svr3
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard1ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard1svr3_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  # Shard 2
  shard2svr1:
    image: mongo:8.0
    container_name: shard2svr1
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard2ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard2svr1_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  shard2svr2:
    image: mongo:8.0
    container_name: shard2svr2
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard2ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard2svr2_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  shard2svr3:
    image: mongo:8.0
    container_name: shard2svr3
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard2ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard2svr3_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  # Shard 3
  shard3svr1:
    image: mongo:8.0
    container_name: shard3svr1
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard3ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard3svr1_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  shard3svr2:
    image: mongo:8.0
    container_name: shard3svr2
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard3ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard3svr2_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  shard3svr3:
    image: mongo:8.0
    container_name: shard3svr3
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongod --shardsvr --replSet shard3ReplSet --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    volumes:
      - shard3svr3_data:/data/db
      - ./keyfile:/etc/mongo/keyfile
    networks:
      - mongo-net

  # Mongos routery
  mongos1:
    image: mongo:8.0
    container_name: mongos1
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongos --configdb configReplSet/configsvr1:27017,configsvr2:27017,configsvr3:27017 --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    ports:
      - "27117:27017"
    volumes:
      - ./keyfile:/etc/mongo/keyfile
      - ./init-scripts:/init-scripts
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
    networks:
      - mongo-net

  mongos2:
    image: mongo:8.0
    container_name: mongos2
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               mongos --configdb configReplSet/configsvr1:27017,configsvr2:27017,configsvr3:27017 --port 27017 --keyFile /etc/mongo/keyfile --bind_ip_all"
    ports:
      - "27118:27017"
    volumes:
      - ./keyfile:/etc/mongo/keyfile
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
    networks:
      - mongo-net

  # Init kontejner který spustí všechny skripty
  mongo-init:
    image: mongo:8.0
    container_name: mongo-init
    volumes:
      - ./init-scripts:/init-scripts
      - ./keyfile:/etc/mongo/keyfile
    depends_on:
      - mongos1
      - mongos2
    command: >
      bash -c "chmod 400 /etc/mongo/keyfile &&
               chown mongodb:mongodb /etc/mongo/keyfile &&
               bash /init-scripts/01-init-configsvr.sh &&
               bash /init-scripts/02-init-shards.sh &&
               bash /init-scripts/03-init-mongos.sh &&
               bash /init-scripts/04-init-users.sh &&
               bash /init-scripts/05-init-validation.sh &&
               bash /init-scripts/06-init-indexes.sh"
    networks:
      - mongo-net

  # MongoCompass web
  compass:
    image: haohanyang/compass-web:latest
    container_name: compass-web
    ports:
      - "3000:3000"
    networks:
      - mongo-net

networks:
  mongo-net:
    driver: bridge

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1svr1_data:
  shard1svr2_data:
  shard1svr3_data:
  shard2svr1_data:
  shard2svr2_data:
  shard2svr3_data:
  shard3svr1_data:
  shard3svr2_data:
  shard3svr3_data: