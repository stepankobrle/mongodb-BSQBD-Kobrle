<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <linearGradient id="grad-config" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0eaff"/>
      <stop offset="100%" stop-color="#c0d2ff"/>
    </linearGradient>
    <linearGradient id="grad-shard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe8c7"/>
      <stop offset="100%" stop-color="#ffc888"/>
    </linearGradient>
    <linearGradient id="grad-router" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7f5df"/>
      <stop offset="100%" stop-color="#a8e6b8"/>
    </linearGradient>
    <linearGradient id="grad-client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d7e6"/>
      <stop offset="100%" stop-color="#e8a8c6"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="bold">MongoDB 8.0 Sharded Cluster – filmdb</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#555">BSQBD Semestralni projekt – architektura (13 kontejneru)</text>

  <!-- Client layer -->
  <rect x="40" y="90" width="1120" height="80" fill="url(#grad-client)" stroke="#9c3d6e" stroke-width="2" rx="8"/>
  <text x="600" y="115" text-anchor="middle" font-weight="bold" font-size="15">Klienti / nastroje</text>
  <rect x="100" y="125" width="170" height="35" fill="white" stroke="#9c3d6e" rx="4"/>
  <text x="185" y="147" text-anchor="middle">mongosh (CLI)</text>
  <rect x="305" y="125" width="220" height="35" fill="white" stroke="#9c3d6e" rx="4"/>
  <text x="415" y="147" text-anchor="middle">MongoCompass Web :3000</text>
  <rect x="560" y="125" width="220" height="35" fill="white" stroke="#9c3d6e" rx="4"/>
  <text x="670" y="147" text-anchor="middle">Python / PyMongo (import)</text>
  <rect x="815" y="125" width="220" height="35" fill="white" stroke="#9c3d6e" rx="4"/>
  <text x="925" y="147" text-anchor="middle">JupyterLab (EDA analyza)</text>

  <!-- Mongos routers layer -->
  <rect x="40" y="210" width="1120" height="110" fill="url(#grad-router)" stroke="#2e7d32" stroke-width="2" rx="8"/>
  <text x="600" y="235" text-anchor="middle" font-weight="bold" font-size="15">Mongos Router Layer (load-balanced)</text>

  <rect x="200" y="250" width="300" height="55" fill="white" stroke="#2e7d32" stroke-width="2" rx="6"/>
  <text x="350" y="273" text-anchor="middle" font-weight="bold">mongos1</text>
  <text x="350" y="292" text-anchor="middle" font-size="12" fill="#444">port 27117 (host)</text>

  <rect x="700" y="250" width="300" height="55" fill="white" stroke="#2e7d32" stroke-width="2" rx="6"/>
  <text x="850" y="273" text-anchor="middle" font-weight="bold">mongos2</text>
  <text x="850" y="292" text-anchor="middle" font-size="12" fill="#444">port 27118 (host)</text>

  <!-- Arrows from clients to mongos -->
  <line x1="350" y1="170" x2="350" y2="248" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="850" y1="170" x2="850" y2="248" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Config servers -->
  <rect x="40" y="355" width="330" height="250" fill="url(#grad-config)" stroke="#1a3a8a" stroke-width="2" rx="8"/>
  <text x="205" y="380" text-anchor="middle" font-weight="bold" font-size="15">Config Replica Set</text>
  <text x="205" y="398" text-anchor="middle" font-size="12" fill="#333">configReplSet (metadata)</text>

  <rect x="65" y="415" width="280" height="50" fill="white" stroke="#1a3a8a" rx="5"/>
  <text x="205" y="435" text-anchor="middle" font-weight="bold">configsvr1 (PRIMARY)</text>
  <text x="205" y="452" text-anchor="middle" font-size="11" fill="#555">--configsvr --replSet configReplSet</text>

  <rect x="65" y="475" width="280" height="50" fill="white" stroke="#1a3a8a" rx="5"/>
  <text x="205" y="495" text-anchor="middle" font-weight="bold">configsvr2 (SECONDARY)</text>
  <text x="205" y="512" text-anchor="middle" font-size="11" fill="#555">heartbeat 2s, election 10s</text>

  <rect x="65" y="535" width="280" height="50" fill="white" stroke="#1a3a8a" rx="5"/>
  <text x="205" y="555" text-anchor="middle" font-weight="bold">configsvr3 (SECONDARY)</text>
  <text x="205" y="572" text-anchor="middle" font-size="11" fill="#555">writeConcern: majority</text>

  <!-- Shard 1 -->
  <rect x="400" y="355" width="250" height="250" fill="url(#grad-shard)" stroke="#8a4a1a" stroke-width="2" rx="8"/>
  <text x="525" y="380" text-anchor="middle" font-weight="bold" font-size="15">Shard 1</text>
  <text x="525" y="398" text-anchor="middle" font-size="12" fill="#333">shard1ReplSet</text>

  <rect x="420" y="415" width="210" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="525" y="435" text-anchor="middle" font-weight="bold">shard1svr1 (PRIMARY)</text>
  <text x="525" y="452" text-anchor="middle" font-size="11" fill="#555">movies / credits / ratings (1/3)</text>

  <rect x="420" y="475" width="210" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="525" y="495" text-anchor="middle" font-weight="bold">shard1svr2 (SECONDARY)</text>
  <text x="525" y="512" text-anchor="middle" font-size="11" fill="#555">oplog sync</text>

  <rect x="420" y="535" width="210" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="525" y="555" text-anchor="middle" font-weight="bold">shard1svr3 (SECONDARY)</text>
  <text x="525" y="572" text-anchor="middle" font-size="11" fill="#555">oplog sync</text>

  <!-- Shard 2 -->
  <rect x="675" y="355" width="250" height="250" fill="url(#grad-shard)" stroke="#8a4a1a" stroke-width="2" rx="8"/>
  <text x="800" y="380" text-anchor="middle" font-weight="bold" font-size="15">Shard 2</text>
  <text x="800" y="398" text-anchor="middle" font-size="12" fill="#333">shard2ReplSet</text>

  <rect x="695" y="415" width="210" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="800" y="435" text-anchor="middle" font-weight="bold">shard2svr1 (PRIMARY)</text>
  <text x="800" y="452" text-anchor="middle" font-size="11" fill="#555">movies / credits / ratings (1/3)</text>

  <rect x="695" y="475" width="210" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="800" y="495" text-anchor="middle" font-weight="bold">shard2svr2 (SECONDARY)</text>
  <text x="800" y="512" text-anchor="middle" font-size="11" fill="#555">oplog sync</text>

  <rect x="695" y="535" width="210" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="800" y="555" text-anchor="middle" font-weight="bold">shard2svr3 (SECONDARY)</text>
  <text x="800" y="572" text-anchor="middle" font-size="11" fill="#555">oplog sync</text>

  <!-- Shard 3 -->
  <rect x="950" y="355" width="210" height="250" fill="url(#grad-shard)" stroke="#8a4a1a" stroke-width="2" rx="8"/>
  <text x="1055" y="380" text-anchor="middle" font-weight="bold" font-size="15">Shard 3</text>
  <text x="1055" y="398" text-anchor="middle" font-size="12" fill="#333">shard3ReplSet</text>

  <rect x="965" y="415" width="180" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="1055" y="435" text-anchor="middle" font-weight="bold">shard3svr1 (PRIMARY)</text>
  <text x="1055" y="452" text-anchor="middle" font-size="10" fill="#555">movies/credits/ratings 1/3</text>

  <rect x="965" y="475" width="180" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="1055" y="495" text-anchor="middle" font-weight="bold">shard3svr2 (SECONDARY)</text>
  <text x="1055" y="512" text-anchor="middle" font-size="11" fill="#555">oplog sync</text>

  <rect x="965" y="535" width="180" height="50" fill="white" stroke="#8a4a1a" rx="5"/>
  <text x="1055" y="555" text-anchor="middle" font-weight="bold">shard3svr3 (SECONDARY)</text>
  <text x="1055" y="572" text-anchor="middle" font-size="11" fill="#555">oplog sync</text>

  <!-- Arrows from mongos to shards/config -->
  <line x1="350" y1="305" x2="205" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="250" y="340" font-size="11" fill="#555" font-style="italic">metadata</text>

  <line x1="350" y1="305" x2="525" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="305" x2="800" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="850" y1="305" x2="525" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="850" y1="305" x2="800" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="305" x2="1055" y2="355" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sharding legend -->
  <rect x="40" y="640" width="1120" height="150" fill="#fafafa" stroke="#bbb" stroke-width="1" rx="6"/>
  <text x="60" y="665" font-weight="bold" font-size="14">Sharding strategie (hashed) + sekundarni indexy</text>

  <text x="60" y="690" font-size="12">
    <tspan font-weight="bold">movies</tspan>  – shard key: { id: "hashed" }    – 4 803 dokumentu ~ 1 601 / shard
  </text>
  <text x="60" y="712" font-size="12">
    <tspan font-weight="bold">credits</tspan> – shard key: { movie_id: "hashed" }  – 4 803 dokumentu ~ 1 601 / shard
  </text>
  <text x="60" y="734" font-size="12">
    <tspan font-weight="bold">ratings</tspan> – shard key: { userId: "hashed" }    – 100 004 dokumentu ~ 33 335 / shard
  </text>
  <text x="60" y="762" font-size="12" fill="#555">
    Sekundarni indexy: title (text), release_date, vote_average, revenue, budget, movieId, userId, rating
  </text>
  <text x="60" y="780" font-size="12" fill="#555">
    Autentizace: SCRAM-SHA-256 + dynamicky keyfile (openssl rand -base64 756) pro internal auth mezi nody
  </text>

  <!-- Data flow annotation -->
  <rect x="40" y="820" width="1120" height="48" fill="#fff3cd" stroke="#cc9900" stroke-width="1" rx="6"/>
  <text x="600" y="843" text-anchor="middle" font-size="12" font-weight="bold">Tok zapisu:</text>
  <text x="600" y="860" text-anchor="middle" font-size="12">
    Klient → mongos (hash shard key) → cilovy shard PRIMARY → oplog replikace na 2 SECONDARY → potvrzeni majority → klient
  </text>
</svg>
