version: '3.8'

# Dynamicke generovani keyfile + two-phase inicializace:
# Phase 0: keyfile-generator vygeneruje keyfile pres openssl do sdileneho volume init_data.
# Phase 1: Vsechny nody startuji BEZ keyfile (no auth) - lze initnout replica sety a vytvorit uzivatele.
# Phase 2: Po zapisu /init-data/phase2 se vsechny nody restartuji S --keyFile.

services:
  # ── Keyfile Generator ──────────────────────────────────────────────────────
  # Vygeneruje dynamicky keyfile pres openssl rand -base64 756.
  # Keyfile je ulozen ve sdilenem volume init_data a mongo nody si ho kopiruji
  # do sveho kontejneru (kvuli moznosti chmod/chown).
  keyfile-generator:
    image: alpine:3.19
    container_name: keyfile-generator
    volumes:
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    command: sh /init-scripts/00-generate-keyfile.sh
    networks:
      - mongo-net

  # ── Config Servers ──────────────────────────────────────────────────────────
  configsvr1:
    image: mongo:8.0
    container_name: configsvr1
    command: bash /init-scripts/startup-configsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    volumes:
      - configsvr1_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  configsvr2:
    image: mongo:8.0
    container_name: configsvr2
    command: bash /init-scripts/startup-configsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    volumes:
      - configsvr2_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  configsvr3:
    image: mongo:8.0
    container_name: configsvr3
    command: bash /init-scripts/startup-configsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    volumes:
      - configsvr3_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  # ── Shard 1 ─────────────────────────────────────────────────────────────────
  shard1svr1:
    image: mongo:8.0
    container_name: shard1svr1
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard1ReplSet
    volumes:
      - shard1svr1_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  shard1svr2:
    image: mongo:8.0
    container_name: shard1svr2
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard1ReplSet
    volumes:
      - shard1svr2_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  shard1svr3:
    image: mongo:8.0
    container_name: shard1svr3
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard1ReplSet
    volumes:
      - shard1svr3_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  # ── Shard 2 ─────────────────────────────────────────────────────────────────
  shard2svr1:
    image: mongo:8.0
    container_name: shard2svr1
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard2ReplSet
    volumes:
      - shard2svr1_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  shard2svr2:
    image: mongo:8.0
    container_name: shard2svr2
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard2ReplSet
    volumes:
      - shard2svr2_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  shard2svr3:
    image: mongo:8.0
    container_name: shard2svr3
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard2ReplSet
    volumes:
      - shard2svr3_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  # ── Shard 3 ─────────────────────────────────────────────────────────────────
  shard3svr1:
    image: mongo:8.0
    container_name: shard3svr1
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard3ReplSet
    volumes:
      - shard3svr1_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  shard3svr2:
    image: mongo:8.0
    container_name: shard3svr2
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard3ReplSet
    volumes:
      - shard3svr2_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  shard3svr3:
    image: mongo:8.0
    container_name: shard3svr3
    command: bash /init-scripts/startup-shardsvr.sh
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
    environment:
      MONGO_REPLSET: shard3ReplSet
    volumes:
      - shard3svr3_data:/data/db
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    networks:
      - mongo-net

  # ── Mongos Routers ──────────────────────────────────────────────────────────
  # startup-mongos.sh waits for /init-data/configreplset-ready before starting
  mongos1:
    image: mongo:8.0
    container_name: mongos1
    command: bash /init-scripts/startup-mongos.sh
    ports:
      - "27117:27017"
    volumes:
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
      configsvr1:
        condition: service_started
      configsvr2:
        condition: service_started
      configsvr3:
        condition: service_started
    networks:
      - mongo-net

  mongos2:
    image: mongo:8.0
    container_name: mongos2
    command: bash /init-scripts/startup-mongos.sh
    ports:
      - "27118:27017"
    volumes:
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    depends_on:
      keyfile-generator:
        condition: service_completed_successfully
      configsvr1:
        condition: service_started
      configsvr2:
        condition: service_started
      configsvr3:
        condition: service_started
    networks:
      - mongo-net

  # ── Init Container ──────────────────────────────────────────────────────────
  mongo-init:
    image: mongo:8.0
    container_name: mongo-init
    volumes:
      - ./init-scripts:/init-scripts
      - init_data:/init-data
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
      - shard1svr1
      - shard1svr2
      - shard1svr3
      - shard2svr1
      - shard2svr2
      - shard2svr3
      - shard3svr1
      - shard3svr2
      - shard3svr3
      - mongos1
      - mongos2
    command: >
      bash -c "
        bash /init-scripts/01-init-configsvr.sh &&
        bash /init-scripts/02-init-shards.sh &&
        bash /init-scripts/03-init-mongos.sh &&
        bash /init-scripts/04-init-users.sh &&
        bash /init-scripts/05-init-validation.sh &&
        bash /init-scripts/06-init-indexes.sh
      "
    networks:
      - mongo-net

  # ── Data Import ─────────────────────────────────────────────────────────────
  data-import:
    image: python:3.11-slim
    container_name: data-import
    volumes:
      - ../Data:/data
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGO_URI: mongodb://filmuser:filmpass123@mongos1:27017/filmdb?authSource=admin
    command: >
      bash -c "pip install pymongo pandas --quiet && python /data/import_data.py"
    networks:
      - mongo-net

  # ── MongoCompass Web ────────────────────────────────────────────────────────
  compass:
    image: haohanyang/compass-web:latest
    container_name: compass-web
    command: compass-web --host 0.0.0.0 --mongo-uri mongodb://admin:adminpass123@mongos1:27017/admin
    ports:
      - "3002:8080"
    depends_on:
      - mongos1
    networks:
      - mongo-net

networks:
  mongo-net:
    driver: bridge

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1svr1_data:
  shard1svr2_data:
  shard1svr3_data:
  shard2svr1_data:
  shard2svr2_data:
  shard2svr3_data:
  shard3svr1_data:
  shard3svr2_data:
  shard3svr3_data:
  init_data:
